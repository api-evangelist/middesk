        in: query
        description: Search query (name, PSD code, or municipality)
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Page number for pagination
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        description: Number of results per page
        required: false
        schema:
          type: integer
      - name: tax_type
        in: query
        description: Filter by tax type (e.g., CITY, EIT, LST)
        required: false
        schema:
          type: string
      - name: local_only
        in: query
        description: When true, returns only local jurisdictions
        required: false
        schema:
          type: string
      - name: supported_only
        in: query
        description: When true, returns only supported jurisdictions
        required: false
        schema:
          type: string
      - name: slug
        in: query
        description: Filter by jurisdiction slug
        required: false
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
