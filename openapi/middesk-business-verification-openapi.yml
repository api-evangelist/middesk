              schema:
                description: Any type
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: Webhook endpoint URL
                secret:
                  type: string
                  description: Secret for webhook signature verification
                enabled_events:
                  type: array
                  items:
                    type: string
                  description: Array of event types to subscribe to, or ["*"] for
                    all events
                include:
                  type: string
                  description: Comma-delimited list of associations to include in
                    webhook payloads. Omit or set to "*" for all. Use "identifiers"
                    to receive only top-level scalar fields (id, external_id, name,
                    status, etc.) with no associations.
                oidc_auth_method:
                  $ref: '#/components/schemas/type_webhooks:WebhookCreateParamOidcAuthMethod'
                  description: OIDC authentication method for obtaining access tokens.
                    Required when configuring OIDC. 'private_key_jwt' — requires oidc_client_id,
                    oidc_token_endpoint, oidc_access_token_ttl_seconds. 'client_secret'
                    — requires oidc_client_id, oidc_client_secret, oidc_token_endpoint,
                    oidc_access_token_ttl_seconds. Both methods optionally accept
                    oidc_scope and oidc_resource_uri.
                oidc_client_id:
                  type: string
                  description: OIDC client ID. Required for both auth methods.
                oidc_client_secret:
                  type: string
                  description: OIDC client secret. Required when oidc_auth_method
                    is 'client_secret'. Write-only; never returned in responses.
                oidc_token_endpoint:
                  type: string
                  description: OIDC token endpoint URL. Required for both auth methods.
                oidc_resource_uri:
                  type: string
                  description: Optional. OIDC resource URI (Microsoft-specific; use
                    oidc_scope for standard OAuth 2.0).
                oidc_scope:
                  type: string
                  description: Optional. OAuth 2.0 scope for the token request (e.g.
                    "api://<app-id>/.default").
                oidc_access_token_ttl_seconds:
                  type: integer
                  description: OIDC access token TTL in seconds. Required for both
                    auth methods.
              required:
              - url
              - enabled_events
