  /v1/agent/questions:
    get:
      operationId: list-questions
      summary: List questions
      description: Retrieve the set of dynamic questions required for a registration
        in a given state or local jurisdiction. The questions returned depend on the
        jurisdiction and registration type.
      tags:
      - subpackage_questions
      parameters:
      - name: state
        in: query
        description: Two-letter US state abbreviation (e.g., CA, NY). Required when
          jurisdiction_slugs is not provided and states is not used.
        required: false
        schema:
          type: string
      - name: states[]
        in: query
        description: Array of two-letter US state abbreviations. Used when fetching
          questions for multiple states.
        required: false
        schema:
          type: string
      - name: jurisdiction_slugs[]
        in: query
        description: Array of local jurisdiction slug identifiers. Used to fetch questions
          specific to local jurisdictions. Must be provided together with the state
          parameter.
        required: false
        schema:
          type: string
      - name: categories[]
        in: query
        description: Filter questions by registration type. Only applicable to state-level
          questions; omit for local jurisdiction questions.
        required: false
        schema:
          $ref: '#/components/schemas/type_questions:ListQuestionsRequestCategoriesItem'
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: questions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_questions:ListQuestionsResponse'
        '400':
          description: bad request — state or states param missing
          content:
            application/json:
              schema:
                description: Any type
        '422':
          description: unprocessable entity — invalid state abbreviation
          content:
            application/json:
              schema:
                description: Any type
