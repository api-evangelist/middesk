          type: string
          nullable: true
          format: email
          description: Email address of the requester. Populated for user requesters
            and `null` for account requesters.
      required:
      - id
      - name
      description: Principal that initiated the run. Populated with the authenticated
        user's identity when a session caller initiates the run, and with the account
        when an API key caller initiates the run. `null` for system-initiated runs.
      title: AgentsRunRequester
    type_:AgentsRunOutput:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/type_:AgentsArtifact'
          description: Artifacts produced by the agent during this run.
      required:
      - artifacts
      description: Artifact envelope produced by the agent. Non-null only when `status`
        is `completed`; `null` for `running`, `interrupted`, and `error` runs.
      title: AgentsRunOutput
    type_:AgentsRunInterruptsItem:
      type: object
      properties:
        id:
          type: string
          description: Identifier of the interrupt request.
        value:
          type: object
          additionalProperties:
            description: Any type
          description: 'Agent-defined interrupt payload. Shape varies by agent, but
            typically carries `agent` (the sub-agent that raised the interrupt), `label`
            (human-readable prompt), and `artifacts` (proposed changes awaiting review).
            The orchestrator agent (`cip_orchestrator`) wraps sub-agent interrupts
            under a `proposals` array with `type: combined_proposal`.'
        agent:
          type: string
          nullable: true
          description: Agent type that raised the interrupt. Lifted from `value.agent`
            and surfaced at the top level for convenience; omitted when the interrupt
            did not declare an agent.
      required:
      - id
      - value
      title: AgentsRunInterruptsItem
    type_:AgentsRun:
      type: object
      properties:
        object:
          type: string
          description: Object type identifier.
        id:
          type: string
          format: uuid
          description: Unique identifier for the agent run.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the agent run record was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the agent run record was last updated.
        status:
          $ref: '#/components/schemas/type_:AgentsRunStatus'
          description: Current lifecycle status of the agent run.
        thread_id:
          type: string
          format: uuid
          description: Identifier of the agent thread this run belongs to.
        agent:
          type: string
          description: Agent type that produced this run (for example, `cip_orchestrator`).
        requester:
          oneOf:
          - $ref: '#/components/schemas/type_:AgentsRunRequester'
          - type: 'null'
          description: Principal that initiated the run. Populated with the authenticated
            user's identity when a session caller initiates the run, and with the
            account when an API key caller initiates the run. `null` for system-initiated
            runs.
        started_at:
          type: string
          nullable: true
          format: date-time
          description: Timestamp when the agent run started.
        ended_at:
          type: string
          nullable: true
          format: date-time
          description: Timestamp when the agent run finished.
        output:
          oneOf:
          - $ref: '#/components/schemas/type_:AgentsRunOutput'
          - type: 'null'
          description: Artifact envelope produced by the agent. Non-null only when
            `status` is `completed`; `null` for `running`, `interrupted`, and `error`
            runs.
        interrupts:
          type: array
          items:
            $ref: '#/components/schemas/type_:AgentsRunInterruptsItem'
          description: Pending interrupt requests awaiting input. Empty when the run
            is not interrupted. To resume a run, POST the interrupt's `id` along with
            the caller-supplied input to `POST /v1/runs/{id}/resume`.
        steps:
          type: array
          items:
            $ref: '#/components/schemas/type_:AgentsStep'
          description: 'Top-level execution steps for this run. Opt-in: pass `?include=steps`
            on `GET /v1/runs/{id}` (or `POST /v1/runs/{id}/resume`) to populate this
            field. Omitted by default to avoid the cost of fetching step state from
            the underlying execution backend.'
      required:
      - object
      - id
      - created_at
      - updated_at
      - status
      description: A single agent run execution within an agent thread.
      title: AgentsRun
    type_runs:ListAgentRunsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/type_:AgentsRun'
        object:
          type: string
        has_more:
          type: boolean
        total_count:
          type: integer
      required:
      - object
      - has_more
      title: ListAgentRunsResponse
