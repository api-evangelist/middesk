openapi: 3.0.3
info:
  title: Middesk API
  version: 1.0.0
paths:
  /v1/businesses:
    get:
      operationId: list-businesses
      summary: List businesses
      tags:
      - subpackage_businesses
      parameters:
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: businesses list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_businesses:ListBusinessesResponse'
    post:
      operationId: create-business
      summary: Create a business
      tags:
      - subpackage_businesses
      parameters:
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '201':
          description: business created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:Business'
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                tin:
                  $ref: '#/components/schemas/type_businesses:BusinessRequestParamTin'
                addresses:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_businesses:BusinessRequestParamAddressesItem'
                website:
                  $ref: '#/components/schemas/type_businesses:BusinessRequestParamWebsite'
                  description: Website information for the business. Required when
                    name and addresses are not provided when ordering the web_analysis
                    and/or industry_classification subproducts.
                people:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_:SubmittedPerson'
                external_id:
                  type: string
                unique_external_id:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                connection_id:
                  type: string
                  description: The ID of a connection to use as the source for this
                    business. Pre-fills the business name and address from the connection.
                orders:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_businesses:BusinessRequestParamOrdersItem'
                  description: Orders to place against the business at creation time.
                    Each order specifies a product (and optional subproducts/options)
                    to run.
              required:
              - name
              - addresses
  /v1/businesses/{id}:
    get:
      operationId: get-business
      summary: Retrieve a business
      tags:
      - subpackage_businesses
      parameters:
      - name: id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: business found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:Business'
        '404':
          description: business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
    patch:
      operationId: update-business
      summary: Update a business
      tags:
      - subpackage_businesses
      parameters:
      - name: id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: business updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:Business'
        '404':
          description: business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  $ref: '#/components/schemas/type_businesses:BusinessUpdateParamStatus'
                  description: Status to set for the business (only final statuses
                    allowed)
                tin:
                  $ref: '#/components/schemas/type_businesses:BusinessUpdateParamTin'
                addresses:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_businesses:BusinessUpdateParamAddressesItem'
                people:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_:SubmittedPerson'
                external_id:
                  type: string
                unique_external_id:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
  /v1/businesses/{id}/pdf:
    get:
      operationId: get-business-pdf
      summary: Retrieve a business PDF
      tags:
      - subpackage_businesses
      parameters:
      - name: id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
        '404':
          description: business not found
          content:
            application/json:
              schema:
                description: Any type
  /v1/businesses/{business_id}/orders:
    get:
      operationId: list-orders
      summary: List orders for a business
      tags:
      - subpackage_orders
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: packages
        in: query
        description: Comma-separated list of packages to filter by
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Page number for pagination
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        description: Number of items per page
        required: false
        schema:
          type: integer
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: orders found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_orders:ListOrdersResponse'
    post:
      operationId: create-order
      summary: Create an order for a business
      tags:
      - subpackage_orders
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '201':
          description: order created
          content:
            application/json:
              schema:
                description: Any type
        '400':
          description: bad request - missing package
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
        '422':
          description: unprocessable entity - reorder validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  $ref: '#/components/schemas/type_orders:OrderRequestParamProduct'
                  description: Product type for the order
                subproducts:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_orders:OrderRequestParamSubproductsItem'
                  description: Array of subproducts
                options:
                  $ref: '#/components/schemas/type_orders:OrderRequestParamOptions'
                  description: Additional options for the order
  /v1/businesses/{business_id}/orders/{id}:
    get:
      operationId: get-order
      summary: Retrieve an order
      tags:
      - subpackage_orders
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: id
        in: path
        description: Order ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:Order'
  /v1/orders/{id}:
    get:
      operationId: get-order-by-id
      summary: Retrieve an order by ID
      tags:
      - subpackage_orders
      parameters:
      - name: id
        in: path
        description: Order ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:Order'
    put:
      operationId: update-order
      summary: Update an order
      tags:
      - subpackage_orders
      parameters:
      - name: id
        in: path
        description: Order ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:Order'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                assignee_id:
                  type: string
                  description: ID of the user to assign the order to
                status:
                  type: string
                  description: New status for the order
  /v1/business_batches:
    get:
      operationId: list-business-batches
      summary: List business batches
      tags:
      - subpackage_businessBatches
      parameters:
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        description: Items per page
        required: false
        schema:
          type: integer
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: business batches list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_businessBatches:ListBusinessBatchesResponse'
    post:
      operationId: create-business-batch
      summary: Create a business batch
      tags:
      - subpackage_businessBatches
      parameters:
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: business batch created
          content:
            application/json:
              schema:
                description: Any type
        '400':
          description: invalid request
          content:
            application/json:
              schema:
                description: Any type
        '422':
          description: validation errors
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name for the business batch
                filename:
                  type: string
                  description: CSV filename
                csv:
                  type: string
                  description: Base64 encoded CSV data
              required:
              - name
              - filename
              - csv
  /v1/business_batches/{id}:
    get:
      operationId: get-business-batch
      summary: Retrieve a business batch
      tags:
      - subpackage_businessBatches
      parameters:
      - name: id
        in: path
        description: Business Batch ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: business batch found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:BusinessBatch'
        '404':
          description: business batch not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
  /v1/business_batches/{id}/csv:
    get:
      operationId: get-business-batch-csv
      summary: Download business batch CSV
      tags:
      - subpackage_businessBatches
      parameters:
      - name: id
        in: path
        description: Business Batch ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: csv download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: business batch not found
          content:
            application/json:
              schema:
                description: Any type
  /v1/signals:
    get:
      operationId: list-signals
      summary: List signals
      tags:
      - subpackage_signals
      parameters:
      - name: page
        in: query
        description: Page number
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        description: Items per page
        required: false
        schema:
          type: integer
      - name: q
        in: query
        description: Search query
        required: false
        schema:
          type: string
      - name: external_id
        in: query
        description: Filter by external ID
        required: false
        schema:
          type: string
      - name: start_date
        in: query
        description: Start date filter (YYYY-MM-DD)
        required: false
        schema:
          type: string
      - name: end_date
        in: query
        description: End date filter (YYYY-MM-DD)
        required: false
        schema:
          type: string
      - name: starting_at
        in: query
        description: Start timestamp filter
        required: false
        schema:
          type: string
      - name: ending_at
        in: query
        description: End timestamp filter
        required: false
        schema:
          type: string
      - name: batch_id
        in: query
        description: Filter by batch ID
        required: false
        schema:
          type: string
      - name: model_slug
        in: query
        description: Filter by model slug
        required: false
        schema:
          type: string
      - name: reason_codes
        in: query
        description: Filter by reason codes
        required: false
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: signals list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_signals:ListSignalsResponse'
    post:
      operationId: create-signal
      summary: Create a signal
      tags:
      - subpackage_signals
      parameters:
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '201':
          description: signal created
          content:
            application/json:
              schema:
                description: Any type
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Company name
                tin:
                  type: string
                  description: Tax identification number
                external_id:
                  type: string
                  description: External identifier
                model_slug:
                  type: string
                  description: Scoring model slug
                addresses:
                  type: array
                  items:
                    type: string
                  description: Array of addresses
                people:
                  type: array
                  items:
                    type: string
                  description: Array of people names
              required:
              - name
              - addresses
  /v1/signals/{id}:
    get:
      operationId: get-signal
      summary: Retrieve a signal
      tags:
      - subpackage_signals
      parameters:
      - name: id
        in: path
        description: Signal ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: signal found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:Signal'
        '404':
          description: signal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
  /v1/businesses/{business_id}/monitor:
    get:
      operationId: get-business-monitor
      summary: Retrieve a monitor for a business
      tags:
      - subpackage_monitoring
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: monitor found
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: monitor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
    post:
      operationId: create-business-monitor
      summary: Create a monitor for a business
      tags:
      - subpackage_monitoring
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '201':
          description: monitor created
          content:
            application/json:
              schema:
                description: Any type
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/type_:MonitoringEventTypesParam'
    put:
      operationId: update-business-monitor
      summary: Update a monitor for a business
      tags:
      - subpackage_monitoring
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: monitor updated
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: monitor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/type_:MonitoringEventTypesParam'
    delete:
      operationId: delete-business-monitor
      summary: Delete a monitor for a business
      tags:
      - subpackage_monitoring
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
        '404':
          description: monitor not found
          content:
            application/json:
              schema:
                description: Any type
  /v1/monitoring/bulk_disable:
    post:
      operationId: bulk-disable-monitors
      summary: Bulk disable monitors
      description: Disables monitors for all businesses in the account. This operation
        is processed asynchronously. When monitor_types is omitted, all monitor types
        allowed for the account are disabled.
      tags:
      - subpackage_monitoring
      parameters:
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                monitor_types:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_monitoring:BulkDisableMonitorsParamMonitorTypesItem'
                  description: Array of monitor types to disable. Defaults to all
                    types allowed for the account.
                notification_email:
                  type: string
                  description: Email address to notify when bulk disable operation
                    completes
  /v1/businesses/{business_id}/liens:
    get:
      operationId: list-liens
      summary: List liens for a business
      tags:
      - subpackage_liens
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: liens found
          content:
            application/json:
              schema:
                description: Any type
        '404':
          description: business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
    post:
      operationId: create-lien
      summary: Create a lien for a business
      tags:
      - subpackage_liens
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '201':
          description: lien created using account defaults
          content:
            application/json:
              schema:
                description: Any type
        '400':
          description: invalid secured parties configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
        '403':
          description: identity or verify order required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
        '404':
          description: business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  $ref: '#/components/schemas/type_liens:LienRequestParamState'
                  description: State where the lien will be filed. Use `state` for
                    a single state or `states` for multiple states. If both are provided,
                    `states` takes precedence.
                states:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_liens:LienRequestParamStatesItem'
                  description: Array of states to file the lien in. Creates one lien
                    per state. Returns a list response. Either `state` or `states`
                    is required.
                debtors:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_liens:LienRequestParamDebtorsItem'
                  description: Array of debtor details
                secured_parties:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_liens:LienRequestParamSecuredPartiesItem'
                  description: Array of secured party details (optional - uses account
                    defaults if not provided)
                secured_party:
                  $ref: '#/components/schemas/type_liens:LienRequestParamSecuredParty'
                  description: Single secured party (alternative to secured_parties
                    array)
                collateral:
                  type: string
                  description: Collateral description (optional - uses account default
                    if not provided)
                loan_principal_amount_cents:
                  type: integer
                  description: Loan principal amount in cents
                packet_number:
                  type: string
                  description: Packet number for the filing (optional - auto-generated
                    if not provided)
                alternative_designation:
                  type: string
                  description: Alternative designation (for Tennessee filings)
              required:
              - debtors
  /v1/businesses/{business_id}/liens/batch:
    post:
      operationId: create-lien-filings-in-batch
      summary: Create lien filings in batch
      description: Creates multiple lien filings in a single request. Each entry is
        processed independently. Successful entries return lien objects, failed entries
        return per-item errors.
      tags:
      - subpackage_liens
      parameters:
      - name: business_id
        in: path
        description: Business ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: batch processed
          content:
            application/json:
              schema:
                description: Any type
        '422':
          description: batch validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:CreateLienFilingsInBatchRequestUnprocessableEntityErrorBody'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                liens:
                  type: array
                  items:
                    $ref: '#/components/schemas/type_liens:LienBatchRequestParamLiensItem'
                  description: Array of lien filing entries. Each entry creates one
                    lien. Each entry must have a unique state. Maximum 50 entries
                    per request.
              required:
              - liens
  /v1/liens/{lien_id}/termination:
    post:
      operationId: create-lien-termination
      summary: Create a termination for a lien
      description: Creates a lien termination or returns existing one if already terminated
      tags:
      - subpackage_lienTerminations
      parameters:
      - name: lien_id
        in: path
        description: Lien ID
        required: true
        schema:
          type: string
      - name: Authorization
        in: header
        description: Bearer authentication
        required: true
        schema:
          type: string
      responses:
        '200':
          description: lien termination created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_lienTerminations:CreateLienTerminationResponse'
        '404':
          description: lien not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/type_:ErrorResponse'
        '422':
          description: lien in created status cannot be terminated
